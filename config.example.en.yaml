# Public URL seen by TVBox clients.
# Leave empty to derive it from the incoming request Host/Scheme.
# Set this when the gateway is behind a reverse proxy, CDN, or NAT and the
# derived URL is not the URL TVBox should use.
public_base_url: http://127.0.0.1:18989

# Controls whether forwarded headers from a reverse proxy are trusted.
# Default: false. Keep false for direct public access.
# Only enable when a trusted reverse proxy overwrites or strips client-supplied
# X-Forwarded-For, X-Forwarded-Proto, and X-Forwarded-Host headers; otherwise
# clients can spoof them to affect cooldowns, HTTPS detection, or Admin UI
# same-origin checks.
trust_forwarded_headers: false

# Defaults for TVBox subscription entries emitted by subs[].path.
# site_key must contain only letters, digits, underscore, or dash.
# timeout is in seconds. Values <= 0 fall back to 15.
# searchable/quick_search/changeable use TVBox integer flags:
#   1 = enabled, 0 = disabled.
# Defaults when omitted:
#   site_key: openlist_tvbox
#   site_name: OpenList
#   language: en
#   timeout: 15
#   searchable: 1
#   quick_search: 0
#   changeable: 0
tvbox:
  site_key: openlist_tvbox
  site_name: OpenList
  language: en
  timeout: 15
  searchable: 1
  quick_search: 0
  changeable: 0

# OpenList / AList / WebDAV backend definitions.
# A backend is a real upstream service. Credentials stay server-side and are
# never emitted to TVBox subscriptions, list responses, play IDs, or subtitles.
#
# id must be unique and contain only letters, digits, underscore, or dash.
# server must be an absolute URL. Trailing slash is trimmed automatically.
# type defaults to openlist_v4. Supported values: openlist_v4, alist_v3, webdav.
#
# auth_type defaults to anonymous when omitted.
# OpenList/AList auth_type values:
#   anonymous: no credential fields are allowed.
#   api_key: requires exactly one of api_key or api_key_env.
#   password: requires user plus exactly one of password or password_env.
#     The gateway automatically sends Client-Id: openlist-tvbox-<backend.id>
#     for AList v3 device/session compatibility.
# WebDAV currently supports anonymous and password; playback and subtitles are
# always returned as gateway proxy URLs, and refresh/search are not supported.
#
# Prefer *_env fields so secrets are read from environment variables instead of
# being stored in this file.
backends:
  - id: main
    type: openlist_v4
    server: https://openlist.example.com
    auth_type: api_key
    # api_key auth sends this value as Authorization when calling OpenList.
    # api_key_env is resolved during startup and must point to a non-empty env var.
    api_key_env: OPENLIST_MAIN_API_KEY
    # Direct value is also supported for simple deployments, but it stores the
    # secret in this file. Set exactly one of api_key or api_key_env.
    # api_key: replace-with-server-side-api-key

  - id: backup
    type: alist_v3
    server: https://backup-openlist.example.com
    auth_type: password
    # password auth logs in server-side, caches the token in memory, and retries
    # once after OpenList reports an expired login token. Tokens are not persisted.
    user: admin
    password_env: OPENLIST_BACKUP_PASSWORD
    # Direct value is also supported for simple deployments, but it stores the
    # secret in this file. Set exactly one of password or password_env.
    # password: replace-with-backend-password

  - id: dav
    type: webdav
    server: https://dav.example.com/remote.php/dav/files/demo
    auth_type: password
    user: demo
    password_env: WEBDAV_PASSWORD

# TVBox subscription interfaces.
# Each item exposes one independent subscription URL. Each subscription owns its
# own mounts list, so the same mount id may appear in different subscriptions.
#
# id defaults to default when empty.
# path defaults to /sub for id=default, otherwise /sub/<id>.
subs:
  - id: all
    path: /sub
    # Optional access-code protection for this subscription.
    # Codes must be 4 to 12 digits. Plaintext access_code is rejected; only
    # bcrypt access_code_hash is accepted.
    #
    # Generate:
    #   openlist-tvbox -hash-password 123456
    #
    # htpasswd and caddy bcrypt hashes are also accepted.
    # access_code_hash: $2a$12$jpEllUPAg/2cQgTLkQAtFeAztfolLH58fj0ldGv6x11yMpPcfBVDm

    # Optional per-sub TVBox identity. When omitted, values inherit from tvbox.
    # site_key must contain only letters, digits, underscore, or dash.
    site_key: openlist_tvbox
    site_name: OpenList
    # You can also override TVBox language and flags for this subscription with:
    tvbox:
      # language accepts zh-CN or en.
      language: en
      # timeout: 20
      # searchable: 1
      # quick_search: 0
      # changeable: 0

    # When set, lives[].url in the subscription points to a gateway proxy URL.
    # The gateway proxies only the live playlist file. EPG and media stream
    # URLs inside that playlist are sent as configured.
    # Note: access_code_hash protects only the TVBox VOD API. Live proxy URLs are not access-code protected.
    #
    # Compatibility note: some Box clients enable their local live URL override
    # only when the subscription contains a non-empty lives list. If you want to
    # rely only on Box's local live URL, you may configure one valid placeholder
    # live source here. 
    # lives:
    #   - name: Live
    #     type: 0
    #     url: https://example.com/iptv
    #     epg: https://example.com/epg
    #     # Optional logo template mainly used by FongMi/TV; not proxied by the gateway.
    #     logo: https://example.com/logo/{name}.png

    # Mounts are the categories and path roots visible to TVBox.
    # TVBox only sees mount ids and mounted paths; it never receives backend ids,
    # backend server URLs, API keys, passwords, or login tokens.
    mounts:
      - id: movies
        # Display name in TVBox. Defaults to id when omitted.
        name: Movies
        # References backends[].id.
        backend: main
        # Backend path exposed as this mount root. Defaults to / when empty.
        # Paths are normalized and may not contain .., backslashes, or NUL bytes.
        path: /Movies

        # Optional OpenList directory passwords.
        # Keys are directory paths relative to this mount root. The longest
        # matching path prefix wins. For mount path /Movies, /Private matches
        # backend path /Movies/Private. Omit params when not needed.
        params:
          /Private: replace-with-directory-password

        # Optional playback headers returned to TVBox for media playback only.
        # These are not sent when the gateway calls OpenList APIs.
        # Sensitive headers such as Authorization and Cookie are rejected because
        # play headers are visible to TVBox.
        # Built-in domain rules may add headers; values here override same-name
        # built-in headers.
        play_headers:
          User-Agent: Mozilla/5.0
          Referer: https://example.com/

        # Whether this mount participates in aggregated search.
        # Default: true. Set false when the category should be browsable but not searched.
        # WebDAV backends do not support search; mounts using WebDAV backends must set this to false.
        search: true

        # Shows a "刷新此目录" action in directory listings.
        # Default: false. OpenList/AList refresh checks server-side write
        # permissions: api_key usually acts as admin; password-auth users need
        # "write content" permission for the mounted path and must satisfy any
        # directory meta write-user whitelist.
        refresh: false

        # Hides this mount from home categories and aggregated search.
        # Default: false.
        hidden: false

      - id: backup_movies
        name: Backup Movies
        backend: backup
        path: /Media/Movies
        search: true
        refresh: false
        hidden: false

      - id: webdav_movies
        name: WebDAV Movies
        backend: dav
        path: /Movies
        search: false
        refresh: false
        hidden: false

  - id: shows
    path: /sub/shows
    site_key: openlist_shows
    site_name: OpenList Shows
    mounts:
      - id: shows
        name: Shows
        backend: main
        path: /Videos/Shows
        search: true
        refresh: false
        hidden: false
